<!DOCTYPE html>
<html>
<head>
    <title>Todo Page</title>
</head>

<body>

<h2>Create Todo Item</h2>

<form action="/submittodoitem" method="POST">

<label>Item Name</label><br>
<input type="text" name="itemName"><br><br>

<label>Item Description</label><br>
<input type="text" name="itemDescription"><br><br>

<label>Item ID:</label>
<input type="text" name="item_id" placeholder="Enter Item ID">
<br><br>

<label>Item UUID:</label>
<input type="text" name="item_uuid" placeholder="Enter Item UUID">
<br><br>
<label>Item Hash:</label>
<input type="text" name="item_hash" placeholder="Enter Item Hash">
<br><br>

<label>Item Hash:</label>
<input type="text" name="item_hash" placeholder="Enter Item Hash">
<br><br>

<button type="submit">Submit</button>

</form>

</body>
</html>
